name: "Android Smoke Testing: Spot Buy and Sell Flow"

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  android-spot-smoke-testing-buy-and-sell-flow:
    runs-on: self-hosted
    env:
      NODE_TLS_REJECT_UNAUTHORIZED: '0'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Appium server
        run: |
          appium &
          sleep 3

      - name: Run tests
        run: mvn test -Dtest=tests.androidSpotBuyAndSellFlow || true

      - name: Generate Job Summary
        if: always()
        run: |
          echo "## 📋 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f target/surefire-reports/TEST-tests.androidSpotBuyAndSellFlow.xml ]; then
            echo "### 📝 Test Details" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ -f target/surefire-reports/checkpoint-results.txt ]; then
              echo "| Test Method | Assertion | Status |" >> $GITHUB_STEP_SUMMARY
              echo "|-------------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
              while IFS='|' read -r test_name step_name status; do
                if [ "$status" = "PASSED" ]; then
                  echo "| $test_name | $step_name | ✅ |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $test_name | $step_name | ❌ |" >> $GITHUB_STEP_SUMMARY
                fi
              done < target/surefire-reports/checkpoint-results.txt
            else
              echo "| Test Method | Status | Duration |" >> $GITHUB_STEP_SUMMARY
              echo "|-------------|--------|----------|" >> $GITHUB_STEP_SUMMARY
              awk '
                /<testcase / {
                  name = ""; ttime = ""
                  if (match($0, /name="[^"]*"/)) {
                    name = substr($0, RSTART+6, RLENGTH-7)
                  }
                  if (match($0, /time="[^"]*"/)) {
                    ttime = substr($0, RSTART+6, RLENGTH-7)
                  }
                  if (name == "setUp" || name == "tearDown" || name == "generateCustomReport") next
                  failed = 0
                  if ($0 ~ /\/>/) {
                    failed = 0
                  } else {
                    while ((getline line) > 0) {
                      if (line ~ /<failure/) { failed = 1 }
                      if (line ~ /<\/testcase>/) { break }
                    }
                  }
                  if (failed) {
                    printf "| %s | ❌ Failed | %ss |\n", name, ttime
                  } else {
                    printf "| %s | ✅ Passed | %ss |\n", name, ttime
                  }
                }
              ' target/surefire-reports/TEST-tests.androidSpotBuyAndSellFlow.xml >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ No test results found." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "📎 **Full report with screenshots:** [View Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)" >> $GITHUB_STEP_SUMMARY

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ github.run_number }}
          path: |
            target/surefire-reports/custom-report.html
            target/screenshots/

      - name: Deploy report to GitHub Pages
        if: always()
        run: |
          REPORT_FILE="target/surefire-reports/custom-report.html"
          if [ ! -f "$REPORT_FILE" ]; then
            echo "No report to deploy"
            exit 0
          fi

          TIMESTAMP=$(date '+%Y-%m-%d_%H%M%S')

          # Copy report and screenshots to temp
          mkdir -p /tmp/report-deploy
          cp "$REPORT_FILE" /tmp/report-deploy/index.html
          cp -r target/surefire-reports/screenshots /tmp/report-deploy/screenshots 2>/dev/null || true

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Switch to gh-pages branch
          if git fetch origin gh-pages 2>/dev/null; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          # Create timestamped report directory
          mkdir -p "reports/$TIMESTAMP"
          cp -r /tmp/report-deploy/* "reports/$TIMESTAMP/"

          # Update latest
          rm -rf reports/latest
          mkdir -p reports/latest
          cp -r /tmp/report-deploy/* reports/latest/

          # Root index redirects to latest
          echo '<meta http-equiv="refresh" content="0;url=reports/latest/index.html">' > index.html

          # Commit and push
          git add -A
          git commit -m "Report $TIMESTAMP" || true
          git push origin gh-pages
