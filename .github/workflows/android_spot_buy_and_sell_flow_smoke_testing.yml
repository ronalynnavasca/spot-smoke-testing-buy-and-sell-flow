name: "Android Smoke Testing: Spot Buy and Sell Flow"

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  android-spot-smoke-testing-buy-and-sell-flow:
    runs-on: self-hosted
    env:
      NODE_TLS_REJECT_UNAUTHORIZED: '0'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Java and Maven
        run: |
          java -version
          mvn --version

      - name: Start Appium server
        run: |
          appium &
          sleep 5

      - name: Run tests
        run: mvn test -Dtest=tests.androidSpotBuyAndSellFlow || true

      - name: Generate Job Summary
        if: always()
        run: |
          echo "## 📋 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Parse test results from surefire report
          if [ -f target/surefire-reports/TEST-tests.androidSpotBuyAndSellFlow.xml ]; then

            echo "### 📝 Test Details" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Use checkpoint file if available for per-assertion breakdown
            if [ -f target/surefire-reports/checkpoint-results.txt ]; then
              echo "| Test Method | Assertion | Status |" >> $GITHUB_STEP_SUMMARY
              echo "|-------------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
              while IFS='|' read -r test_name step_name status; do
                if [ "$status" = "PASSED" ]; then
                  echo "| $test_name | $step_name | ✅ |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $test_name | $step_name | ❌ |" >> $GITHUB_STEP_SUMMARY
                fi
              done < target/surefire-reports/checkpoint-results.txt
            else
              # Fallback to XML-only approach - only show actual test methods
              echo "| Test Method | Status | Duration |" >> $GITHUB_STEP_SUMMARY
              echo "|-------------|--------|----------|" >> $GITHUB_STEP_SUMMARY
              awk '
                /<testcase / {
                  name = ""; ttime = ""
                  if (match($0, /name="[^"]*"/)) {
                    name = substr($0, RSTART+6, RLENGTH-7)
                  }
                  if (match($0, /time="[^"]*"/)) {
                    ttime = substr($0, RSTART+6, RLENGTH-7)
                  }
                  # Skip non-test methods
                  if (name == "setUp" || name == "tearDown" || name == "generateCustomReport") next
                  failed = 0
                  if ($0 ~ /\/>/) {
                    failed = 0
                  } else {
                    while ((getline line) > 0) {
                      if (line ~ /<failure/) { failed = 1 }
                      if (line ~ /<\/testcase>/) { break }
                    }
                  }
                  if (failed) {
                    printf "| %s | ❌ Failed | %ss |\n", name, ttime
                  } else {
                    printf "| %s | ✅ Passed | %ss |\n", name, ttime
                  }
                }
              ' target/surefire-reports/TEST-tests.androidSpotBuyAndSellFlow.xml >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ No test results found." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "📎 **Full report with screenshots:** [View Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)" >> $GITHUB_STEP_SUMMARY

      - name: Ensure gtar is available for Pages artifact
        if: always()
        run: |
          if ! command -v gtar &> /dev/null; then
            if command -v brew &> /dev/null; then
              brew install gnu-tar
            fi
            # Fallback: symlink tar as gtar if gnu-tar not available
            if ! command -v gtar &> /dev/null; then
              sudo ln -sf $(which tar) /usr/local/bin/gtar
            fi
          fi

      - name: Prepare report for Pages
        if: always()
        run: |
          mkdir -p pages-output
          cp target/surefire-reports/custom-report.html pages-output/index.html 2>/dev/null || true

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: |
            target/surefire-reports/custom-report.html
            target/screenshots/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        if: always()
        with:
          path: pages-output

  deploy-report:
    needs: android-spot-smoke-testing-buy-and-sell-flow
    runs-on: ubuntu-latest
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
