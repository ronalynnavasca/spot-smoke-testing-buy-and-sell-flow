name: "Android Smoke Testing: Spot Buy and Sell Flow"

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  android-spot-smoke-testing-buy-and-sell-flow:
    runs-on: self-hosted
    env:
      NODE_TLS_REJECT_UNAUTHORIZED: '0'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Java and Maven
        run: |
          java -version
          mvn --version

      - name: Start Appium server
        run: |
          appium &
          sleep 5

      - name: Run tests
        run: mvn test -Dtest=tests.androidSpotBuyAndSellFlow || true

      - name: Generate Job Summary
        if: always()
        run: |
          echo "## 📋 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Parse test results from surefire report
          if [ -f target/surefire-reports/TEST-tests.androidSpotBuyAndSellFlow.xml ]; then

            echo "### 📝 Test Details" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Use checkpoint file if available for per-assertion breakdown
            if [ -f target/surefire-reports/checkpoint-results.txt ]; then
              echo "| Test Method | Assertion | Status |" >> $GITHUB_STEP_SUMMARY
              echo "|-------------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
              while IFS='|' read -r test_name step_name status; do
                if [ "$status" = "PASSED" ]; then
                  echo "| $test_name | $step_name | ✅ |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $test_name | $step_name | ❌ |" >> $GITHUB_STEP_SUMMARY
                fi
              done < target/surefire-reports/checkpoint-results.txt
            else
              # Fallback to XML-only approach - only show actual test methods
              echo "| Test Method | Status | Duration |" >> $GITHUB_STEP_SUMMARY
              echo "|-------------|--------|----------|" >> $GITHUB_STEP_SUMMARY
              awk '
                /<testcase / {
                  name = ""; ttime = ""
                  if (match($0, /name="[^"]*"/)) {
                    name = substr($0, RSTART+6, RLENGTH-7)
                  }
                  if (match($0, /time="[^"]*"/)) {
                    ttime = substr($0, RSTART+6, RLENGTH-7)
                  }
                  # Skip non-test methods
                  if (name == "setUp" || name == "tearDown" || name == "generateCustomReport") next
                  failed = 0
                  if ($0 ~ /\/>/) {
                    failed = 0
                  } else {
                    while ((getline line) > 0) {
                      if (line ~ /<failure/) { failed = 1 }
                      if (line ~ /<\/testcase>/) { break }
                    }
                  }
                  if (failed) {
                    printf "| %s | ❌ Failed | %ss |\n", name, ttime
                  } else {
                    printf "| %s | ✅ Passed | %ss |\n", name, ttime
                  }
                }
              ' target/surefire-reports/TEST-tests.androidSpotBuyAndSellFlow.xml >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ No test results found." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "📎 **Full report with screenshots:** [View Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)" >> $GITHUB_STEP_SUMMARY

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: |
            target/surefire-reports/custom-report.html
            target/screenshots/

      - name: Deploy report to GitHub Pages
        if: always()
        run: |
          REPORT_FILE="target/surefire-reports/custom-report.html"
          if [ ! -f "$REPORT_FILE" ]; then
            echo "No report to deploy"
            exit 0
          fi

          TIMESTAMP=$(date '+%Y-%m-%d_%H-%M-%S')
          REPORT_NAME="report_${TIMESTAMP}.html"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch gh-pages branch or create it
          git fetch origin gh-pages:gh-pages 2>/dev/null || git checkout --orphan gh-pages

          # Switch to gh-pages
          git checkout gh-pages

          # Create reports directory
          mkdir -p reports

          # Copy new report
          cp "$REPORT_FILE" "reports/$REPORT_NAME"

          # Also keep as latest
          cp "$REPORT_FILE" "reports/latest.html"

          # Generate index.html with links to all reports (newest first)
          cat > index.html << 'INDEXEOF'
          <!DOCTYPE html>
          <html><head><meta charset="utf-8">
          <title>Test Reports - Android Spot Buy and Sell Flow</title>
          <style>
          body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 20px; background: #f0f2f5; }
          .header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 30px; border-radius: 10px; margin-bottom: 25px; }
          .header h1 { margin: 0; font-size: 24px; }
          .header p { margin: 10px 0 0; opacity: 0.7; }
          .report-list { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
          .report-item { padding: 15px 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
          .report-item:hover { background: #f7fafc; }
          .report-item a { color: #2b6cb0; text-decoration: none; font-weight: 500; }
          .report-item a:hover { text-decoration: underline; }
          .latest-badge { background: #c6f6d5; color: #22543d; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
          </style></head><body>
          <div class="header">
          <h1>Test Execution Reports</h1>
          <p>Android Smoke Testing: Spot Buy and Sell Flow</p>
          </div>
          <div class="report-list">
          INDEXEOF

          # Add latest report link
          echo "<div class='report-item'><a href='reports/latest.html'>📋 Latest Report</a><span class='latest-badge'>LATEST</span></div>" >> index.html

          # List all reports newest first
          for f in $(ls -r reports/report_*.html 2>/dev/null); do
            fname=$(basename "$f")
            # Extract date from filename
            display_date=$(echo "$fname" | sed 's/report_//;s/.html//;s/_/ /;s/-/:/3;s/-/:/3')
            echo "<div class='report-item'><a href='reports/$fname'>$display_date</a></div>" >> index.html
          done

          cat >> index.html << 'INDEXEOF'
          </div></body></html>
          INDEXEOF

          # Commit and push
          git add index.html reports/
          git commit -m "Add report $TIMESTAMP" || true
          git push origin gh-pages
