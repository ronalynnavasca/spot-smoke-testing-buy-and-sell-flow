name: "Android Smoke Testing: Spot Buy and Sell Flow"

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  android-spot-smoke-testing-buy-and-sell-flow:
    runs-on: self-hosted
    env:
      NODE_TLS_REJECT_UNAUTHORIZED: '0'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Java and Maven
        run: |
          java -version
          mvn --version

      - name: Start Appium server
        run: |
          appium &
          sleep 5

      - name: Run tests
        run: mvn test -Dtest=tests.spotBuyAndSellFlow || true

      - name: Generate Job Summary
        if: always()
        run: |
          echo "## 📋 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Parse test results from surefire report
          if [ -f target/surefire-reports/TEST-tests.spotBuyAndSellFlow.xml ]; then

            echo "### 📝 Test Details" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Use checkpoint file if available for per-assertion breakdown
            if [ -f target/surefire-reports/checkpoint-results.txt ]; then
              echo "| Test Method | Assertion | Status |" >> $GITHUB_STEP_SUMMARY
              echo "|-------------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
              while IFS='|' read -r test_name step_name status; do
                if [ "$status" = "PASSED" ]; then
                  echo "| $test_name | $step_name | ✅ |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $test_name | $step_name | ❌ |" >> $GITHUB_STEP_SUMMARY
                fi
              done < target/surefire-reports/checkpoint-results.txt
            else
              # Fallback to XML-only approach
              echo "| Test Method | Status | Duration |" >> $GITHUB_STEP_SUMMARY
              echo "|-------------|--------|----------|" >> $GITHUB_STEP_SUMMARY
              awk '
                /<testcase / {
                  name = ""; ttime = ""
                  if (match($0, /name="[^"]*"/)) {
                    name = substr($0, RSTART+6, RLENGTH-7)
                  }
                  if (match($0, /time="[^"]*"/)) {
                    ttime = substr($0, RSTART+6, RLENGTH-7)
                  }
                  failed = 0
                  if ($0 ~ /\/>/) {
                    failed = 0
                  } else {
                    while ((getline line) > 0) {
                      if (line ~ /<failure/) { failed = 1 }
                      if (line ~ /<\/testcase>/) { break }
                    }
                  }
                  if (failed) {
                    printf "| tests.spotBuyAndSellFlow>>%s | ❌ Failed | %ss |\n", name, ttime
                  } else {
                    printf "| tests.spotBuyAndSellFlow>>%s | ✅ Passed | %ss |\n", name, ttime
                  }
                }
              ' target/surefire-reports/TEST-tests.spotBuyAndSellFlow.xml >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ No test results found." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "📎 **Full report with screenshots:** [View Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)" >> $GITHUB_STEP_SUMMARY

      - name: Ensure gtar is available for Pages artifact
        if: always()
        run: |
          if ! command -v gtar &> /dev/null; then
            if command -v brew &> /dev/null; then
              brew install gnu-tar
            fi
            # Fallback: symlink tar as gtar if gnu-tar not available
            if ! command -v gtar &> /dev/null; then
              sudo ln -sf $(which tar) /usr/local/bin/gtar
            fi
          fi

      - name: Prepare report for Pages
        if: always()
        run: |
          mkdir -p pages-output
          cp target/surefire-reports/custom-report.html pages-output/index.html 2>/dev/null || true

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: |
            target/surefire-reports/custom-report.html
            target/screenshots/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        if: always()
        with:
          path: pages-output

      - name: Notify Slack
        if: always()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          # Parse test results
          PASSED=0
          FAILED=0
          if [ -f target/surefire-reports/checkpoint-results.txt ]; then
            PASSED=$(grep -c "|PASSED$" target/surefire-reports/checkpoint-results.txt || true)
            FAILED=$(grep -c "|FAILED$" target/surefire-reports/checkpoint-results.txt || true)
          elif [ -f target/surefire-reports/TEST-tests.spotBuyAndSellFlow.xml ]; then
            TOTAL=$(grep -o 'tests="[0-9]*"' target/surefire-reports/TEST-tests.spotBuyAndSellFlow.xml | head -1 | grep -o '[0-9]*')
            FAILURES=$(grep -o 'failures="[0-9]*"' target/surefire-reports/TEST-tests.spotBuyAndSellFlow.xml | head -1 | grep -o '[0-9]*')
            ERRORS=$(grep -o 'errors="[0-9]*"' target/surefire-reports/TEST-tests.spotBuyAndSellFlow.xml | head -1 | grep -o '[0-9]*')
            FAILED=$((FAILURES + ERRORS))
            PASSED=$((TOTAL - FAILED))
          fi

          DATE=$(date '+%Y-%m-%d %H:%M:%S')
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$FAILED" -eq 0 ]; then
            STATUS_EMOJI=":large_green_circle:"
            STATUS_TEXT="Passed"
          else
            STATUS_EMOJI=":red_circle:"
            STATUS_TEXT="Failed"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "${STATUS_EMOJI} *Android Smoke Testing: Spot Buy and Sell Flow*\n\nStatus: *${STATUS_TEXT}*"
                }
              },
              {
                "type": "section",
                "fields": [
                  {"type": "mrkdwn", "text": ":white_check_mark: *Passed:* ${PASSED}"},
                  {"type": "mrkdwn", "text": ":x: *Failed:* ${FAILED}"},
                  {"type": "mrkdwn", "text": ":calendar: *Date:* ${DATE}"}
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {"type": "plain_text", "text": "View Report"},
                    "url": "${REPORT_URL}"
                  },
                  {
                    "type": "button",
                    "text": {"type": "plain_text", "text": "View Run"},
                    "url": "${RUN_URL}"
                  }
                ]
              }
            ]
          }
          EOF
          )

          # Send to DM
          echo "$PAYLOAD" | jq --arg ch "D06CM34G90A" '. + {channel: $ch}' | \
            curl -s -X POST https://slack.com/api/chat.postMessage \
              -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              -H "Content-Type: application/json" \
              -d @-

          # Send to #auto-report channel
          echo "$PAYLOAD" | jq --arg ch "C0AKNRDA49Z" '. + {channel: $ch}' | \
            curl -s -X POST https://slack.com/api/chat.postMessage \
              -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              -H "Content-Type: application/json" \
              -d @-

  deploy-report:
    needs: android-spot-smoke-testing-buy-and-sell-flow
    runs-on: ubuntu-latest
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
