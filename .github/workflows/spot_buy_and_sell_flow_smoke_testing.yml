name: "Smoke Testing: Spot Buy and Sell Flow"

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    env:
      NODE_TLS_REJECT_UNAUTHORIZED: '0'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Java and Maven
        run: |
          java -version
          mvn --version

      - name: Start Appium server
        run: |
          appium &
          sleep 5

      - name: Run tests
        run: mvn test -Dtest=tests.spotBuyAndSellFlow || true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: |
            target/surefire-reports/custom-report.html
            target/screenshots/
