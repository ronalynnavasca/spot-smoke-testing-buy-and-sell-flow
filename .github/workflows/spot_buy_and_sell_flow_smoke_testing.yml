name: "Smoke Testing: Spot Buy and Sell Flow"

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: self-hosted
    env:
      NODE_TLS_REJECT_UNAUTHORIZED: '0'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Java and Maven
        run: |
          java -version
          mvn --version

      - name: Start Appium server
        run: |
          appium &
          sleep 5

      - name: Run tests
        run: mvn test -Dtest=tests.spotBuyAndSellFlow || true

      - name: Generate Job Summary
        if: always()
        run: |
          echo "## 📋 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Parse test results from surefire report
          if [ -f target/surefire-reports/TEST-tests.spotBuyAndSellFlow.xml ]; then
            TESTS=$(grep -o 'tests="[0-9]*"' target/surefire-reports/TEST-tests.spotBuyAndSellFlow.xml | head -1 | grep -o '[0-9]*')
            FAILURES=$(grep -o 'failures="[0-9]*"' target/surefire-reports/TEST-tests.spotBuyAndSellFlow.xml | head -1 | grep -o '[0-9]*')
            ERRORS=$(grep -o 'errors="[0-9]*"' target/surefire-reports/TEST-tests.spotBuyAndSellFlow.xml | head -1 | grep -o '[0-9]*')
            SKIPPED=$(grep -o 'skipped="[0-9]*"' target/surefire-reports/TEST-tests.spotBuyAndSellFlow.xml | head -1 | grep -o '[0-9]*')
            TIME=$(grep -o 'time="[^"]*"' target/surefire-reports/TEST-tests.spotBuyAndSellFlow.xml | head -1 | grep -o '"[^"]*"' | tr -d '"')
            PASSED=$((TESTS - FAILURES - ERRORS - SKIPPED))

            if [ "$FAILURES" = "0" ] && [ "$ERRORS" = "0" ]; then
              echo "### ✅ All Tests Passed" >> $GITHUB_STEP_SUMMARY
            else
              echo "### ❌ Some Tests Failed" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| ⚠️ Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| ⏭️ Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
            echo "| ⏱️ Duration | ${TIME}s |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "### 📝 Test Details" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Test Method | Status | Duration |" >> $GITHUB_STEP_SUMMARY
            echo "|-------------|--------|----------|" >> $GITHUB_STEP_SUMMARY

            # Parse individual test cases using awk to correctly detect failures
            awk '
              /<testcase / {
                name = ""; ttime = ""
                if (match($0, /name="[^"]*"/)) {
                  name = substr($0, RSTART+6, RLENGTH-7)
                }
                if (match($0, /time="[^"]*"/)) {
                  ttime = substr($0, RSTART+6, RLENGTH-7)
                }
                failed = 0
                # Self-closing testcase tag means passed (no failure child)
                if ($0 ~ /\/>/) {
                  failed = 0
                } else {
                  # Read until closing </testcase> to check for <failure
                  while ((getline line) > 0) {
                    if (line ~ /<failure/) { failed = 1 }
                    if (line ~ /<\/testcase>/) { break }
                  }
                }
                if (failed) {
                  printf "| tests.spotBuyAndSellFlow>>%s | ❌ Failed | %ss |\n", name, ttime
                } else {
                  printf "| tests.spotBuyAndSellFlow>>%s | ✅ Passed | %ss |\n", name, ttime
                }
              }
            ' target/surefire-reports/TEST-tests.spotBuyAndSellFlow.xml >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No test results found." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "📎 **Full report with screenshots:** [View Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)" >> $GITHUB_STEP_SUMMARY

      - name: Prepare report for Pages
        if: always()
        run: |
          mkdir -p pages-output
          cp target/surefire-reports/custom-report.html pages-output/index.html 2>/dev/null || true

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: |
            target/surefire-reports/custom-report.html
            target/screenshots/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        if: always()
        with:
          path: pages-output

  deploy-report:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
